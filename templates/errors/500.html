{% extends "base/layout.html" %}

{% block title %}Server Error{% endblock %}

{% block content %}
<div class="text-center py-5">
    <div class="display-1 text-warning">500</div>
    <h2><i class="fas fa-exclamation-triangle"></i> Internal Server Error</h2>
    <p>Something went wrong on our end. Please try again later.</p>
    <p>If the problem persists, contact system administrator.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary">Go to Dashboard</a>
</div>
{% endblock %}
