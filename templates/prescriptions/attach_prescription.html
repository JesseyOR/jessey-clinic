{% extends "base/layout.html" %}

{% block title %}Attach Prescription{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-prescription"></i> Attach Prescription to Patient</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label">Patient *</label>
                            <select name="patient_id" class="form-select" required>
                                <option value="">Select patient</option>
                                {% for patient in patients %}
                                <option value="{{ patient.id }}">{{ patient.full_name }} ({{ patient.phone or 'no phone' }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Drug *</label>
                            <select name="drug_id" class="form-select" required>
                                <option value="">Select drug</option>
                                {% for drug in drugs %}
                                <option value="{{ drug.id }}">{{ drug.name }} {% if drug.requires_prescription %}(Rx Required){% endif %}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Doctor Name</label>
                            <input type="text" name="doctor_name" class="form-control" placeholder="Dr. ...">
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Prescription Date</label>
                                <input type="date" name="prescription_date" class="form-control" value="{{ now.strftime('%Y-%m-%d') }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Expiry Date</label>
                                <input type="date" name="expiry_date" class="form-control">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Upload Prescription Image (optional)</label>
                            <input type="file" name="prescription_image" class="form-control" accept="image/*,.pdf">
                        </div>
                        <button type="submit" class="btn btn-primary">Save Prescription</button>
                        <a href="{{ url_for('prescriptions.list') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
