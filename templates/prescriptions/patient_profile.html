{% extends "base/layout.html" %}

{% block title %}Patient Profile{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5><i class="fas fa-id-card"></i> Patient Profile</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>First Name *</label>
                                <input type="text" name="first_name" class="form-control" value="{{ patient.first_name }}" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Last Name *</label>
                                <input type="text" name="last_name" class="form-control" value="{{ patient.last_name }}" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Phone</label>
                                <input type="text" name="phone" class="form-control" value="{{ patient.phone or '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Email</label>
                                <input type="email" name="email" class="form-control" value="{{ patient.email or '' }}">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label>Date of Birth</label>
                                <input type="date" name="date_of_birth" class="form-control" value="{{ patient.date_of_birth.strftime('%Y-%m-%d') if patient.date_of_birth else '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label>Gender</label>
                                <select name="gender" class="form-select">
                                    <option value="">Select</option>
                                    <option value="Male" {% if patient.gender == 'Male' %}selected{% endif %}>Male</option>
                                    <option value="Female" {% if patient.gender == 'Female' %}selected{% endif %}>Female</option>
                                    <option value="Other" {% if patient.gender == 'Other' %}selected{% endif %}>Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Allergies</label>
                            <textarea name="allergies" class="form-control" rows="2">{{ patient.allergies or '' }}</textarea>
                        </div>
                        <div class="mb-3">
                            <label>Blood Type</label>
                            <input type="text" name="blood_type" class="form-control" value="{{ patient.blood_type or '' }}">
                        </div>
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                        <a href="{{ url_for('prescriptions.patient_history', patient_id=patient.id) }}" class="btn btn-secondary">View History</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
