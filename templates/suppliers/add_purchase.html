{% extends "base/layout.html" %}

{% block title %}Record Purchase{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="fas fa-shopping-cart"></i> Record Stock Purchase from Supplier</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3">
                            <label class="form-label">Supplier *</label>
                            <select name="supplier_id" class="form-select" required>
                                <option value="">Select supplier</option>
                                {% for supplier in suppliers %}
                                <option value="{{ supplier.id }}">{{ supplier.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Drug *</label>
                            <select name="drug_id" class="form-select" required>
                                <option value="">Select drug</option>
                                {% for drug in drugs %}
                                <option value="{{ drug.id }}">{{ drug.name }} (Current stock: {{ drug.quantity }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Quantity *</label>
                                <input type="number" name="quantity" class="form-control" required min="1">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">Unit Buying Price *</label>
                                <input type="number" step="0.01" name="buying_price" class="form-control" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Batch Number</label>
                            <input type="text" name="batch_number" class="form-control">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Expiry Date</label>
                            <input type="date" name="expiry_date" class="form-control">
                        </div>
                        <div class="mb-3 form-check">
                            <input type="checkbox" name="update_stock" class="form-check-input" id="updateStock" checked>
                            <label class="form-check-label" for="updateStock">Add to inventory automatically</label>
                        </div>
                        <button type="submit" class="btn btn-primary">Record Purchase</button>
                        <a href="{{ url_for('suppliers.list_suppliers') }}" class="btn btn-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
